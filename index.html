<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#800080" />
  <title>Bodyshop — Damage Analyser</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="images/logo.jpg" />
  <link rel="icon" href="images/logo.jpg" />
  <link rel="stylesheet" href="src/style.css" />
</head>

<body>

  <header>
    <img src="images/logo.jpg" alt="logo" id="logo" />
    <div>
      <h1>Bodyshop</h1>
      <p>AI Damage Analyser</p>
    </div>
  </header>

  <main>

    <!-- Hidden file inputs — completely standalone -->
    <input type="file" id="file-in" accept="image/*" style="display:none" />
    <input type="file" id="cam-in" accept="image/*" capture="environment" style="display:none" />

    <!-- Drop zone — drag only, no click conflict -->
    <div id="drop-zone">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5"
        stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="3" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      <p>Drag image here</p>
    </div>

    <!-- Dedicated upload button -->
    <button class="btn primary" id="upload-btn">📁 Upload Image</button>

    <!-- Camera button -->
    <button class="btn-cam" id="cam-btn">📷 Take Photo</button>

    <!-- rest of your HTML unchanged below -->
    <div id="preview-wrap">
      <img id="preview" alt="preview" />
      <canvas id="overlay"></canvas>
    </div>

    <div id="error-box"></div>

    <div id="dmg-loading">
      <div class="spinner"></div>
      <p>Analysing damage...</p>
    </div>

    <button class="btn primary" id="analyse-btn" disabled>Analyse Damage</button>
    <button class="btn ghost" id="reset-btn">New Photo</button>

    <div id="severity-badge">
      <div class="badge-label">Overall Severity</div>
      <div class="badge-value" id="sev-val"></div>
      <div class="badge-conf" id="sev-conf"></div>
    </div>

    <div id="prob-bars">
      <h3>Severity breakdown</h3>
      <div class="bar-row">
        <span class="bar-label">Minor</span>
        <div class="bar-track">
          <div class="bar-fill" id="b-minor" style="background:#2ecc71"></div>
        </div>
        <span class="bar-pct" id="p-minor"></span>
      </div>
      <div class="bar-row">
        <span class="bar-label">Moderate</span>
        <div class="bar-track">
          <div class="bar-fill" id="b-moderate" style="background:#f39c12"></div>
        </div>
        <span class="bar-pct" id="p-moderate"></span>
      </div>
      <div class="bar-row">
        <span class="bar-label">Severe</span>
        <div class="bar-track">
          <div class="bar-fill" id="b-severe" style="background:#e74c3c"></div>
        </div>
        <span class="bar-pct" id="p-severe"></span>
      </div>
    </div>

    <div id="damage-section">
      <h2>Damage detected</h2>
      <div id="damage-list"></div>
    </div>

    <div id="parts-section">
      <h2>Car parts affected</h2>
      <div id="parts-list"></div>
    </div>

  </main>

  <script src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('SW ✅'))
          .catch(err => console.log('SW ❌', err));
      });
    }
  </script>

</body>

</html>
